<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Isaiah Mack-Russell Management Dashboard</title>
<style>
:root{--bg:#02030a;--card:rgba(255,255,255,.07);--line:rgba(255,255,255,.14);--ink:#f5f7ff;--muted:#aebbd7;--cyan:#56f0ff;--gold:#ffd66e;--red:#ff6b8a}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 70% 10%,rgba(86,240,255,.16),transparent 32%),radial-gradient(circle at 10% 80%,rgba(255,214,110,.12),transparent 30%),var(--bg);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;min-height:100vh}.wrap{max-width:1240px;margin:0 auto;padding:36px 18px 80px}.top{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:24px}.kicker{color:var(--cyan);text-transform:uppercase;letter-spacing:.16em;font-size:12px;font-weight:1000}h1{margin:8px 0 0;font-size:clamp(42px,6vw,88px);line-height:.86;letter-spacing:-.07em;text-transform:uppercase}.panel{border:1px solid var(--line);border-radius:28px;background:var(--card);box-shadow:0 35px 120px rgba(0,0,0,.35);backdrop-filter:blur(18px);padding:20px}.settings{display:grid;grid-template-columns:1.5fr 1fr auto;gap:12px;align-items:end;margin-bottom:18px}label{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px;font-weight:900}input,select{width:100%;border:1px solid var(--line);background:rgba(0,0,0,.28);color:var(--ink);border-radius:15px;padding:13px 14px;font:inherit;outline:none}button,.btn{border:1px solid rgba(86,240,255,.55);background:rgba(86,240,255,.14);color:white;border-radius:999px;padding:13px 16px;font-weight:1000;text-transform:uppercase;letter-spacing:.1em;font-size:11px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px}.counts{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px;margin:18px 0}.count{border:1px solid var(--line);border-radius:22px;background:rgba(255,255,255,.055);padding:16px}.count b{display:block;font-size:34px;letter-spacing:-.06em}.count span{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.12em}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0}.toolbar input{max-width:360px}table{width:100%;border-collapse:collapse;overflow:hidden;border-radius:18px}th,td{text-align:left;border-bottom:1px solid rgba(255,255,255,.09);padding:13px;vertical-align:top;font-size:13px}th{color:var(--cyan);text-transform:uppercase;letter-spacing:.12em;font-size:10px;background:rgba(255,255,255,.055)}td{color:#eaf1ff}.pill{display:inline-flex;border:1px solid rgba(255,214,110,.35);color:var(--gold);border-radius:999px;padding:6px 8px;font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-weight:900}.muted,.small{color:var(--muted)}.small{font-size:12px;line-height:1.5}.hide{display:none!important}@media(max-width:900px){.top,.settings{display:block}.settings>*{margin-bottom:12px}.counts{grid-template-columns:repeat(2,1fr)}table{display:block;overflow-x:auto;white-space:nowrap}}
</style>
</head>
<body>
<main class="wrap">
<div class="top"><div><div class="kicker">Family / Management</div><h1>Lead Dashboard</h1></div><a class="btn" href="/">Back to Site</a></div>
<section class="panel"><div class="settings"><div><label>Google Apps Script Web App URL</label><input id="endpoint" placeholder="Paste your Web App URL here"></div><div><label>Admin Token</label><input id="token" placeholder="Private token"></div><button id="saveSettings">Save + Load</button></div><p class="small">This dashboard reads submissions from the Google Sheet backend. Keep the admin token private.</p><div id="status" class="small"></div></section>
<section class="counts"><div class="count"><b id="totalCount">0</b><span>Total Leads</span></div><div class="count"><b id="fanCount">0</b><span>55 Club</span></div><div class="count"><b id="recruiterCount">0</b><span>Recruiters</span></div><div class="count"><b id="mediaCount">0</b><span>Media</span></div><div class="count"><b id="sponsorCount">0</b><span>Sponsors</span></div></section>
<section class="panel"><div class="toolbar"><input id="search" placeholder="Search name, email, organization, message..."><select id="typeFilter"><option value="">All Lead Types</option><option value="55">55 Club / Fans</option><option value="recruit">Recruiters</option><option value="media">Media</option><option value="sponsor">Sponsors</option></select><button id="exportCsv">Export CSV</button><button id="refresh">Refresh</button></div><div id="empty" class="small">No leads loaded yet.</div><div id="tableWrap" class="hide"><table><thead><tr><th>Date</th><th>Type</th><th>Name</th><th>Contact</th><th>Organization</th><th>Role / Interest</th><th>Message</th><th>Status</th></tr></thead><tbody id="leadRows"></tbody></table></div></section>
</main>
<script>
let leads=[];const els={endpoint:document.getElementById('endpoint'),token:document.getElementById('token'),status:document.getElementById('status'),total:document.getElementById('totalCount'),fans:document.getElementById('fanCount'),recruiters:document.getElementById('recruiterCount'),media:document.getElementById('mediaCount'),sponsors:document.getElementById('sponsorCount'),rows:document.getElementById('leadRows'),tableWrap:document.getElementById('tableWrap'),empty:document.getElementById('empty'),search:document.getElementById('search'),typeFilter:document.getElementById('typeFilter')};function loadSettings(){els.endpoint.value=localStorage.getItem('imr_endpoint')||'';els.token.value=localStorage.getItem('imr_token')||''}function saveSettings(){localStorage.setItem('imr_endpoint',els.endpoint.value.trim());localStorage.setItem('imr_token',els.token.value.trim())}function fmtDate(v){if(!v)return'';const d=new Date(v);return isNaN(d)?String(v):d.toLocaleString()}function csvEscape(v){const s=String(v??'');return /[",\n]/.test(s)?`"${s.replace(/"/g,'""')}"`:s}function filtered(){const q=els.search.value.trim().toLowerCase();const t=els.typeFilter.value.trim().toLowerCase();return leads.filter(l=>{const blob=Object.values(l).join(' ').toLowerCase();const type=String(l.lead_type||'').toLowerCase();return(!q||blob.includes(q))&&(!t||type.includes(t))})}function render(){const list=filtered();els.rows.innerHTML='';els.empty.classList.toggle('hide',list.length>0);els.tableWrap.classList.toggle('hide',list.length===0);list.forEach(l=>{const tr=document.createElement('tr');tr.innerHTML=`<td>${fmtDate(l.timestamp)}</td><td><span class="pill">${l.lead_type||'General'}</span></td><td><b>${l.name||''}</b></td><td><div>${l.email||''}</div><div class="muted">${l.phone||''}</div></td><td>${l.organization||''}</td><td><div>${l.role||''}</div><div class="muted">${l.interest||''}</div></td><td>${l.message||''}</td><td>${l.status||'New'}</td>`;els.rows.appendChild(tr)})}async function loadLeads(){saveSettings();const endpoint=els.endpoint.value.trim();const token=els.token.value.trim();if(!endpoint||!token){els.status.textContent='Paste your backend URL and token, then click Save + Load.';return}els.status.textContent='Loading leads...';const url=endpoint+(endpoint.includes('?')?'&':'?')+'token='+encodeURIComponent(token)+'&t='+Date.now();try{const res=await fetch(url);const data=await res.json();if(!data.ok)throw new Error(data.error||'Backend error');leads=data.leads||[];const c=data.counts||{};els.total.textContent=c.total??leads.length;els.fans.textContent=c.fans??0;els.recruiters.textContent=c.recruiters??0;els.media.textContent=c.media??0;els.sponsors.textContent=c.sponsors??0;els.status.textContent=`Loaded ${leads.length} leads.`;render()}catch(err){els.status.textContent='Could not load leads: '+err.message}}function exportCsv(){const list=filtered();const headers=['timestamp','lead_type','name','email','phone','organization','role','interest','message','source_page','status','notes'];const csv=[headers.join(',')].concat(list.map(l=>headers.map(h=>csvEscape(l[h])).join(','))).join('\n');const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='isaiah-mack-russell-leads.csv';a.click();URL.revokeObjectURL(a.href)}document.getElementById('saveSettings').addEventListener('click',loadLeads);document.getElementById('refresh').addEventListener('click',loadLeads);document.getElementById('exportCsv').addEventListener('click',exportCsv);els.search.addEventListener('input',render);els.typeFilter.addEventListener('change',render);loadSettings();if(els.endpoint.value&&els.token.value)loadLeads();
</script>
</body>
</html>
